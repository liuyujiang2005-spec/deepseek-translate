# Render 一键部署：会生成固定网址 https://xxx.onrender.com
# 在 https://render.com 连接 GitHub 仓库后，在 Dashboard 用此 Blueprint 或手动建 Web Service
services:
  - type: web
    name: deepseek-translate-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PORT
        value: 3000
